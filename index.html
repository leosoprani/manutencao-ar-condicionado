<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AR JAMPA | Gestão de Manutenção</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <link rel="stylesheet" href="/style.css" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00f2ff" />
    <link rel="apple-touch-icon" href="/icon.png" />
  </head>
  <body>
    <div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease-out;">
      <div style="background: rgba(0, 242, 255, 0.1); width: 100px; height: 100px; border-radius: 30px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);">
        <span class="material-symbols-rounded" style="font-size: 50px; color: var(--primary);">ac_unit</span>
      </div>
      <h1 style="color: white; font-size: 24px; letter-spacing: 2px; margin-bottom: 5px;">AR JAMPA</h1>
      <p style="color: var(--primary); font-size: 12px; font-weight: 500; opacity: 0.8;">SISTEMA DE MANUTENÇÃO</p>
      
      <div style="width: 40px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 40px; overflow: hidden;">
        <div id="splash-loader" style="width: 0%; height: 100%; background: var(--primary); transition: width 2s ease-in-out;"></div>
      </div>
      
      <p style="position: absolute; bottom: 40px; font-size: 10px; color: var(--text-secondary); opacity: 0.5;">Carregando sua agenda...</p>
    </div>

    <div id="app">
      <!-- Main Layout Shell -->
      <header class="app-header">
        <div class="header-top">
          <div class="logo">
            <span class="material-symbols-rounded">ac_unit</span>
            <h1 id="app-title-display">AR JAMPA</h1>
          </div>
          <div class="user-profile" style="display: flex; align-items: center; gap: 10px;">
            <div class="avatar" style="width: 32px; height: 32px; border-radius: 50%; overflow: hidden; background: var(--surface-container);">
              <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Nolan&accessories[]=round" alt="User Avatar" style="width: 100%;" />
            </div>
            <div class="user-info">
              <span id="display-user-name" style="font-size: 12px; font-weight: 600; color: white; display: block;">Técnico</span>
              <span style="font-size: 10px; color: var(--primary); display: block;">Online</span>
            </div>
          </div>
          <div class="header-actions">
            <button id="btn-notifications" class="icon-btn">
              <span class="material-symbols-rounded">notifications</span>
              <span class="badge">4</span>
            </button>
          </div>
        </div>
        <div class="header-content" id="header-content">
          <h2>Painel de Bairros</h2>
          <p>Visão Geral de Manutenções Pendentes</p>
        </div>
      </header>

      <main id="main-content">
        <!-- Content will be injected here -->
        <div class="loading-state">
          <div class="spinner"></div>
        </div>
      </main>

      <nav class="bottom-nav">
        <button class="nav-item active" data-view="home">
          <span class="material-symbols-rounded">home</span>
          <span>Home</span>
        </button>
        <button class="nav-item" data-view="bairros">
          <span class="material-symbols-rounded">app_registration</span>
          <span>Cadastrar</span>
        </button>
        <button class="nav-item" data-view="os">
          <span class="material-symbols-rounded">assignment</span>
          <span>OS</span>
        </button>
        <button class="nav-item" data-view="mais">
          <span class="material-symbols-rounded">more_horiz</span>
          <span>Mais</span>
        </button>
      </nav>


      <button id="fab-add" class="fab">
        <span class="material-symbols-rounded">add</span>
      </button>

      <!-- Modal Shell -->
      <div id="modal-overlay" class="modal-overlay">
        <div class="modal-container">
          <div class="modal-header">
            <h3 id="modal-title">Nova Manutenção</h3>
            <button id="btn-close-modal" class="icon-btn">
              <span class="material-symbols-rounded">close</span>
            </button>
          </div>
          <div class="modal-body" id="modal-body">
            <!-- Form will be injected here -->
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
