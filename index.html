<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR JAMPA - Titanium</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="splash-screen">
    <img src="https://cdn-icons-png.flaticon.com/512/2835/2835912.png" alt="logo" style="filter: hue-rotate(180deg) brightness(1.5);">
    <h2 style="margin-top:20px; font-weight:800; color:var(--primary);">AR JAMPA</h2>
  </div>

  <div class="app-container">
    <header id="header-content"></header>
    <main id="main-content"></main>
    <nav class="bottom-nav">
      <div class="nav-item active" data-view="home"><span class="material-symbols-rounded">home</span><span>Home</span></div>
      <div class="nav-item" data-view="bairros"><span class="material-symbols-rounded">grid_view</span><span>Cadastrar</span></div>
      <div class="nav-item" data-view="os"><span class="material-symbols-rounded">assignment</span><span>Histórico</span></div>
      <div class="nav-item" data-view="mais"><span class="material-symbols-rounded">settings</span><span>Ajustes</span></div>
    </nav>
  </div>

  <div id="modal-overlay">
    <div class="modal-content">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
        <h3 id="modal-title" style="margin:0; font-size:20px; font-weight:800;">Título</h3>
        <span class="material-symbols-rounded" id="btn-close-modal" style="cursor:pointer;">close</span>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
