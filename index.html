<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR JAMPA | Gestão Profissional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#05070a">
</head>
<body>
    <div id="splash-screen" style="position: fixed; inset: 0; background: #05070a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s;">
        <div style="width: 80px; height: 80px; background: var(--primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(0,242,255,0.3);">
            <span class="material-symbols-rounded" style="font-size: 48px; color: #000;">ac_unit</span>
        </div>
        <h1 style="margin-top: 20px; font-family: 'Montserrat', sans-serif; font-size: 24px; letter-spacing: 2px;">AR JAMPA</h1>
        <p style="font-size: 10px; opacity: 0.5; text-transform: uppercase; letter-spacing: 3px;">Titanium Ultra v3</p>
    </div>

    <div class="app-container">
        <header id="header-main">
            <div class="user-info">
                <div class="user-profile">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar">
                </div>
                <div class="user-text">
                    <h1>Olá, técnico</h1>
                    <p id="display-user-name">Carregando...</p>
                </div>
            </div>
            <button class="icon-btn" style="background: rgba(255,255,255,0.05); border:none; border-radius:12px; width:40px; height:40px; color:white;">
                <span class="material-symbols-rounded">notifications</span>
            </button>
        </header>

        <div id="header-content" style="padding: 0 20px 10px;"></div>
        <main id="main-content"></main>

        <nav class="bottom-nav">
            <div class="nav-item active" data-view="home">
                <span class="material-symbols-rounded">home</span>
                <span>Home</span>
            </div>
            <div class="nav-item" data-view="bairros">
                <span class="material-symbols-rounded">apartment</span>
                <span>Cadastrar</span>
            </div>
            <div class="nav-item" data-view="os">
                <span class="material-symbols-rounded">assignment</span>
                <span>Histórico</span>
            </div>
            <div class="nav-item" data-view="mais">
                <span class="material-symbols-rounded">settings</span>
                <span>Ajustes</span>
            </div>
        </nav>
    </div>

    <div id="modal-overlay">
        <div class="modal-content animate-in">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2 id="modal-title" style="margin:0; font-size: 20px;">Detalhes</h2>
                <button id="btn-close-modal" style="background:none; border:none; color:white; cursor:pointer;">
                    <span class="material-symbols-rounded">close</span>
                </button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
