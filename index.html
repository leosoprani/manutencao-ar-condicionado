<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR JAMPA | Gestão de Manutenção</title>
  <meta name="theme-color" content="#050a10">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
  <div id="splash-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#050a10; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; font-family:'Outfit', sans-serif;">
    <h1 style="font-size:32px; font-weight:800; color:#00f2ff; margin-bottom:10px;">AR JAMPA</h1>
    <div style="width:100px; height:4px; background:rgba(255,255,255,0.1); border-radius:10px; overflow:hidden;">
      <div id="splash-loader" style="width:0%; height:100%; background:#00f2ff; transition: width 0.5s;"></div>
    </div>
  </div>

  <div class="app-container">
    <header class="top-bar"><div style="position: absolute; left: 50%; transform: translateX(-50%); font-weight: 800; font-size: 18px; color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); letter-spacing: 1px;">AR JAMPA</div>
      <div class="user-profile">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Leo" alt="User">
        <div class="user-info">
          <span class="user-greeting">Olá,</span>
          <span class="user-name" id="display-user-name">Técnico</span>
        </div>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="btn-notifications"><span class="material-symbols-rounded">notifications</span></button>
      </div>
    </header>

    <div id="header-content" style="padding: 0 20px 20px;"></div>
    <main id="main-content" class="content-area"></main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-view="home"><span class="material-symbols-rounded">home</span><span>Home</span></button>
      <button class="nav-item" data-view="bairros"><span class="material-symbols-rounded">app_registration</span><span>Cadastrar</span></button>
      <button class="nav-item" data-view="os"><span class="material-symbols-rounded">history</span><span>Histórico</span></button>
      <button class="nav-item" data-view="mais"><span class="material-symbols-rounded">more_horiz</span><span>Perfil</span></button>
    </nav>

    <button class="fab" id="fab-add"><span class="material-symbols-rounded">add</span></button>
  </div>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title" style="margin:0; font-size:18px;">Novo Registro</h3>
        <button id="btn-close-modal" class="icon-btn" style="width:32px; height:32px; border:none; background:transparent;"><span class="material-symbols-rounded">close</span></button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
