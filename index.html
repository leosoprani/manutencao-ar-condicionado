<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR JAMPA | Gestão Profissional</title>
  <meta name="theme-color" content="#050a10">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
  <div id="splash-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#050a10; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white;">
    <!-- Technical Maintenance Icon (Snowflake + Shield/Gear) -->
    <div style="position: relative; margin-bottom: 30px; animation: pulse 2s infinite ease-in-out;">
      <svg width="100" height="100" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity: 0.3; filter: drop-shadow(0 0 20px var(--primary));">
        <path d="M12 2L12 4M12 20L12 22M4 12H2M22 12H20M19.07 4.93L17.66 6.34M6.34 17.66L4.93 19.07M19.07 19.07L17.66 17.66M6.34 6.34L4.93 4.93" stroke="#00f2ff" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M12 8C9.79086 8 8 9.79086 8 12C8 14.2091 9.79086 16 12 16C14.2091 16 16 14.2091 16 12C16 9.79086 14.2091 8 12 8Z" stroke="#00f2ff" stroke-width="1.5"/>
        <path d="M12 6L12 18M6 12L18 12M7.75 7.75L16.25 16.25M16.25 7.75L7.75 16.25" stroke="#00f2ff" stroke-width="1" opacity="0.5"/>
      </svg>
      <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.8;">
         <span class="material-symbols-rounded" style="font-size: 32px; color: #00f2ff;">ac_unit</span>
      </div>
    </div>
    <h1 id="splash-app-name" style="font-family:'Montserrat', sans-serif; font-size:24px; font-weight:800; color:#00f2ff; margin-bottom:15px; text-transform:uppercase; letter-spacing:5px; text-shadow: 0 0 15px rgba(0,242,255,0.4);">AR JAMPA</h1>
    <div style="width:120px; height:1px; background:rgba(255,255,255,0.05); border-radius:10px; overflow:hidden;">
      <div id="splash-loader" style="width:0%; height:100%; background:var(--primary); transition: width 0.5s;"></div>
    </div>
    <p style="opacity:0.3; font-size:9px; margin-top:20px; font-family:'Inter', sans-serif; letter-spacing:4px; font-weight:600; text-transform:uppercase;">Iniciando Protocolos Técnicos</p>
  </div>

  <div class="app-container">
    <header class="top-bar">
      <div class="user-profile">
        <img src="" alt="User">
        <div class="user-info">
          <span class="user-greeting">Olá,</span>
          <span class="user-name" id="display-user-name">Técnico</span>
        </div>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="btn-notifications"><span class="material-symbols-rounded" style="font-size: 20px;">notifications</span></button>
      </div>
    </header>

    <div id="header-content" style="padding: 0 20px 20px;"></div>
    <main id="main-content" class="content-area"></main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-view="home"><span class="material-symbols-rounded">home</span><span>Home</span></button>
      <button class="nav-item" data-view="bairros"><span class="material-symbols-rounded">location_city</span><span>Zonas</span></button>
      <button class="nav-item" data-view="os"><span class="material-symbols-rounded">receipt_long</span><span>Histórico</span></button>
      <button class="nav-item" data-view="mais"><span class="material-symbols-rounded">settings</span><span>Ajustes</span></button>
    </nav>

    <button class="fab" id="fab-add"><span class="material-symbols-rounded">add</span></button>
  </div>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title" style="margin:0; font-family:'Montserrat', sans-serif; font-size:18px;">Novo Registro</h3>
        <button id="btn-close-modal" class="icon-btn" style="width:32px; height:32px; border:none; background:transparent;"><span class="material-symbols-rounded">close</span></button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
