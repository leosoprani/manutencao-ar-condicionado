<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR JAMPA | Gestão de Manutenção</title>
  <meta name="theme-color" content="#050a10">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-logo">AR JAMPA</div>
    <div class="loader-container">
      <div id="splash-loader" class="loader-bar"></div>
    </div>
    <p>Carregando sua agenda...</p>
  </div>

  <div class="app-container">
    <!-- Top Bar -->
    <header class="top-bar">
      <div class="user-profile">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Leo" alt="User">
        <div class="user-info">
          <span class="user-greeting">Olá,</span>
          <span class="user-name" id="display-user-name">Técnico</span>
        </div>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="btn-notifications">
          <span class="material-symbols-rounded">notifications</span>
        </button>
      </div>
    </header>

    <div id="header-content" style="padding: 0 20px 20px;"></div>

    <!-- Main Content -->
    <main id="main-content" class="content-area"></main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-view="home">
        <span class="material-symbols-rounded">home</span>
        <span>Home</span>
      </button>
      <button class="nav-item" data-view="bairros">
        <span class="material-symbols-rounded">app_registration</span>
        <span>Cadastrar</span>
      </button>
      <button class="nav-item" data-view="os">
        <span class="material-symbols-rounded">history</span>
        <span>Histórico</span>
      </button>
      <button class="nav-item" data-view="mais">
        <span class="material-symbols-rounded">more_horiz</span>
        <span>Perfil</span>
      </button>
    </nav>

    <!-- Floating Action Button -->
    <button class="fab" id="fab-add">
      <span class="material-symbols-rounded">add</span>
    </button>
  </div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Novo Registro</h3>
        <button id="btn-close-modal" class="icon-btn">
          <span class="material-symbols-rounded">close</span>
        </button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
